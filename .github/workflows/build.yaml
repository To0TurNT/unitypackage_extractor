name: Release Build

# Cut a release by pushing a tag, e.g.:
#   git tag v1.2.0
#   git push origin v1.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    strategy:
      max-parallel: 4
      matrix:
        architecture: [x86, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9 (${{ matrix.architecture }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: ${{ matrix.architecture }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name UnityPackageExtractor unitypackage_extractor/extractor.py

      - name: Package release zip
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item dist/UnityPackageExtractor.exe $staging/
          Copy-Item optional -Destination $staging/optional -Recurse
          Copy-Item README.md, LICENSE.txt, CHANGELOG.md $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath "unitypackage_extractor-${{ matrix.architecture }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unitypackage_extractor-${{ matrix.architecture }}
          path: unitypackage_extractor-${{ matrix.architecture }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/To0TurNT/unitypackage_extractor/blob/${{ github.ref_name }}/CHANGELOG.md) for changes in this release.

            **Downloads:** grab `unitypackage_extractor-x64.zip` for most machines, or `-x86` for 32-bit Python/Windows.
